<svg viewBox="0 0 1160 760" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1160" height="760" fill="#ffffff"/>
  <text x="580" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f3d5c">ShopFlow: Cloud-Native Order Platform on AWS (Capstone Architecture)</text>
  <text x="580" y="54" text-anchor="middle" font-size="11" fill="#64748b">solid arrows = request and data flow   ·   REST = synchronous   ·   SQS = asynchronous</text>

  <!-- ===== CI/CD DELIVERY ===== -->
  <rect x="20" y="95" width="210" height="300" rx="10" fill="#effaf7" stroke="#0f766e" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="125" y="114" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f766e">CI/CD DELIVERY</text>

  <rect x="45" y="128" width="160" height="42" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="125" y="154" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1e3a8a">Developer</text>
  <rect x="45" y="186" width="160" height="42" rx="8" fill="#f1f5f9" stroke="#334155" stroke-width="2"/>
  <text x="125" y="212" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#0f172a">GitHub repo</text>
  <rect x="45" y="244" width="160" height="60" rx="8" fill="#ffffff" stroke="#15577d" stroke-width="2"/>
  <text x="125" y="268" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#15577d">Jenkins pipeline</text>
  <text x="125" y="287" text-anchor="middle" font-size="10" fill="#475569">SonarQube · Trivy gates</text>
  <rect x="45" y="326" width="160" height="42" rx="8" fill="#e8f3fb" stroke="#1f7fbf" stroke-width="2"/>
  <text x="125" y="352" text-anchor="middle" font-size="12" font-weight="bold" fill="#145e8c">Nexus (artifacts)</text>

  <line x1="125" y1="170" x2="125" y2="186" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <line x1="125" y1="228" x2="125" y2="244" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <line x1="125" y1="304" x2="125" y2="326" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <text x="133" y="320" font-size="9" fill="#475569">publish JAR</text>

  <!-- ===== AWS CLOUD ===== -->
  <rect x="250" y="70" width="895" height="670" rx="10" fill="#fff8f2" stroke="#ec7211" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="270" y="90" font-size="13" font-weight="bold" fill="#b4530f">AWS CLOUD</text>

  <!-- ECR top-left -->
  <rect x="272" y="112" width="135" height="46" rx="8" fill="#fff1e6" stroke="#ec7211" stroke-width="2"/>
  <text x="339" y="132" text-anchor="middle" font-size="12" font-weight="bold" fill="#b4530f">Amazon ECR</text>
  <text x="339" y="149" text-anchor="middle" font-size="9.5" fill="#475569">container images</text>

  <!-- request path -->
  <rect x="590" y="108" width="180" height="40" rx="8" fill="#e9f7ef" stroke="#16a34a" stroke-width="2"/>
  <text x="680" y="133" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#15803d">Users / browser</text>
  <rect x="605" y="162" width="150" height="34" rx="8" fill="#e7f0fb" stroke="#146eb4" stroke-width="2"/>
  <text x="680" y="184" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#0f4f86">Route 53 (DNS)</text>
  <rect x="558" y="210" width="244" height="44" rx="8" fill="#e7f0fb" stroke="#146eb4" stroke-width="2"/>
  <text x="680" y="230" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f4f86">Application Load Balancer</text>
  <text x="680" y="246" text-anchor="middle" font-size="9.5" fill="#475569">single entry point · TLS via ACM</text>

  <line x1="680" y1="148" x2="680" y2="162" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <line x1="680" y1="196" x2="680" y2="210" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <line x1="680" y1="254" x2="680" y2="352" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <text x="688" y="300" font-size="10" fill="#475569">HTTPS</text>

  <!-- VPC -->
  <rect x="272" y="340" width="610" height="300" rx="10" fill="#f6f9fb" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="540" y="360" font-size="11.5" font-weight="bold" fill="#334155">VPC · private subnets across 2 Availability Zones</text>

  <!-- EKS -->
  <rect x="288" y="372" width="578" height="190" rx="10" fill="#eef3fd" stroke="#326ce5" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="312" y="391" font-size="11.5" font-weight="bold" fill="#2453b3">EKS cluster</text>

  <rect x="298" y="402" width="120" height="46" rx="6" fill="#ffffff" stroke="#326ce5" stroke-width="2"/>
  <text x="358" y="423" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#2453b3">Storefront</text>
  <text x="358" y="438" text-anchor="middle" font-size="9" fill="#475569">React</text>
  <rect x="431" y="402" width="120" height="46" rx="6" fill="#ffffff" stroke="#326ce5" stroke-width="2"/>
  <text x="491" y="423" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#2453b3">Orders svc</text>
  <text x="491" y="438" text-anchor="middle" font-size="9" fill="#475569">Spring Boot</text>
  <rect x="564" y="402" width="120" height="46" rx="6" fill="#ffffff" stroke="#326ce5" stroke-width="2"/>
  <text x="624" y="423" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#2453b3">Catalog svc</text>
  <text x="624" y="438" text-anchor="middle" font-size="9" fill="#475569">Spring Boot</text>
  <rect x="697" y="402" width="150" height="46" rx="6" fill="#ffffff" stroke="#326ce5" stroke-width="2"/>
  <text x="772" y="423" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#2453b3">Notifications</text>
  <text x="772" y="438" text-anchor="middle" font-size="9" fill="#475569">Spring Boot worker</text>

  <line x1="418" y1="425" x2="431" y2="425" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <line x1="551" y1="425" x2="564" y2="425" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <text x="476" y="397" text-anchor="middle" font-size="8.5" fill="#475569">REST</text>
  <text x="609" y="397" text-anchor="middle" font-size="8.5" fill="#475569">REST</text>

  <!-- observability inside cluster -->
  <rect x="298" y="470" width="215" height="42" rx="6" fill="#f1ecf8" stroke="#6b3fa0" stroke-width="2"/>
  <text x="405" y="496" text-anchor="middle" font-size="11" font-weight="bold" fill="#553084">Prometheus + Grafana</text>
  <rect x="528" y="470" width="175" height="42" rx="6" fill="#f1ecf8" stroke="#6b3fa0" stroke-width="2"/>
  <text x="615" y="496" text-anchor="middle" font-size="11" font-weight="bold" fill="#553084">Fluent Bit (logs)</text>

  <!-- RDS -->
  <rect x="300" y="582" width="250" height="46" rx="8" fill="#e6f0f5" stroke="#2a6f97" stroke-width="2"/>
  <text x="425" y="603" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e5275">Amazon RDS (PostgreSQL)</text>
  <text x="425" y="619" text-anchor="middle" font-size="9" fill="#475569">Multi-AZ · schema per service</text>
  <line x1="491" y1="448" x2="465" y2="582" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <line x1="624" y1="448" x2="500" y2="582" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <text x="470" y="520" font-size="9" fill="#475569">JDBC (private)</text>

  <!-- SQS async -->
  <rect x="900" y="402" width="130" height="46" rx="8" fill="#f3eefe" stroke="#8c4fff" stroke-width="2"/>
  <text x="965" y="423" text-anchor="middle" font-size="12" font-weight="bold" fill="#6b2fd6">Amazon SQS</text>
  <text x="965" y="438" text-anchor="middle" font-size="9" fill="#475569">order events</text>
  <polyline points="491,402 491,386 965,386 965,402" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <text x="720" y="380" text-anchor="middle" font-size="9.5" fill="#475569">publish event (async)</text>
  <line x1="947" y1="448" x2="800" y2="470" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <polyline points="900,438 855,448 820,448" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <text x="858" y="466" font-size="9" fill="#475569">consume</text>

  <!-- platform services bottom -->
  <rect x="300" y="660" width="185" height="46" rx="8" fill="#fff1e6" stroke="#ec7211" stroke-width="2"/>
  <text x="392" y="681" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#b4530f">Amazon Cognito</text>
  <text x="392" y="697" text-anchor="middle" font-size="9" fill="#475569">user authentication</text>
  <rect x="505" y="660" width="205" height="46" rx="8" fill="#fde2e2" stroke="#b91c1c" stroke-width="2"/>
  <text x="607" y="681" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#b91c1c">Secrets Manager</text>
  <text x="607" y="697" text-anchor="middle" font-size="9" fill="#475569">secrets via IRSA</text>
  <rect x="730" y="660" width="195" height="46" rx="8" fill="#f1ecf8" stroke="#6b3fa0" stroke-width="2"/>
  <text x="827" y="681" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#553084">CloudWatch</text>
  <text x="827" y="697" text-anchor="middle" font-size="9" fill="#475569">central logs and metrics</text>

  <line x1="392" y1="660" x2="392" y2="562" stroke="#475569" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <text x="398" y="600" font-size="9" fill="#475569">auth</text>
  <line x1="607" y1="660" x2="607" y2="562" stroke="#475569" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <text x="613" y="600" font-size="9" fill="#475569">secrets</text>
  <line x1="700" y1="512" x2="800" y2="660" stroke="#475569" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <text x="742" y="590" font-size="9" fill="#475569">logs/metrics</text>

  <!-- delivery arrows into AWS -->
  <line x1="207" y1="266" x2="270" y2="142" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <text x="214" y="200" font-size="9" fill="#475569">push image</text>
  <line x1="339" y1="158" x2="339" y2="372" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <text x="344" y="300" font-size="9" fill="#475569">pull image</text>
  <line x1="207" y1="290" x2="286" y2="430" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <text x="214" y="372" font-size="9" fill="#475569">kubectl deploy</text>
</svg>
